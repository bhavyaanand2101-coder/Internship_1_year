<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        .quote-box {
            margin: 30px 0;
        }

        #quote {
            font-size: 1.5rem;
            line-height: 1.8;
            color: #222;
            margin-bottom: 20px;
        }

        #author {
            color: #666;
            font-style: italic;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
        }

        #newQuote {
            background: #4f46e5;
        }

        #copyQuote {
            background: #16a34a;
        }

        #shareQuote {
            background: #0284c7;
        }

        #speakQuote {
            background: #ea580c;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #222;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .loading {
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>✨ Random Quote Generator</h1>

        <div class="quote-box">
            <p id="quote">Click "New Quote" to begin</p>
            <h3 id="author"></h3>
        </div>

        <div class="buttons">
            <button id="newQuote">🔄 New Quote</button>
            <button id="copyQuote">📋 Copy</button>
            <button id="shareQuote">🐦 Share</button>
            <button id="speakQuote">🔊 Speak</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const quoteEl = document.getElementById("quote");
        const authorEl = document.getElementById("author");
        const toast = document.getElementById("toast");

        const fallbackQuotes = [
            {
                quote: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
                author: "Winston Churchill"
            },
            {
                quote: "The future depends on what you do today.",
                author: "Mahatma Gandhi"
            },
            {
                quote: "Dream big and dare to fail.",
                author: "Norman Vaughan"
            },
            {
                quote: "Stay hungry, stay foolish.",
                author: "Steve Jobs"
            },
            {
                quote: "Believe you can and you're halfway there.",
                author: "Theodore Roosevelt"
            }
        ];

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 2000);
        }

        async function getQuote() {
            try {
                quoteEl.textContent = "Loading...";
                quoteEl.classList.add("loading");
                authorEl.textContent = "";

                const response = await fetch(
                    "https://dummyjson.com/quotes/random"
                );

                if (!response.ok) {
                    throw new Error("API Error");
                }

                const data = await response.json();

                quoteEl.textContent = `"${data.quote}"`;
                authorEl.textContent = `— ${data.author}`;

            } catch (error) {

                const random =
                    fallbackQuotes[
                    Math.floor(
                        Math.random() * fallbackQuotes.length
                    )
                    ];

                quoteEl.textContent = `"${random.quote}"`;
                authorEl.textContent = `— ${random.author}`;

                console.log("Using fallback quote");
            }

            quoteEl.classList.remove("loading");
        }

        document
            .getElementById("newQuote")
            .addEventListener("click", getQuote);

        document
            .getElementById("copyQuote")
            .addEventListener("click", async () => {

                const text =
                    quoteEl.textContent +
                    " " +
                    authorEl.textContent;

                try {
                    await navigator.clipboard.writeText(text);
                    showToast("Quote Copied!");
                } catch {
                    showToast("Copy Failed");
                }
            });

        document
            .getElementById("shareQuote")
            .addEventListener("click", () => {

                const text =
                    quoteEl.textContent +
                    " " +
                    authorEl.textContent;

                const twitterURL =
                    `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;

                window.open(twitterURL, "_blank");
            });

        document
            .getElementById("speakQuote")
            .addEventListener("click", () => {

                const speech =
                    new SpeechSynthesisUtterance(
                        quoteEl.textContent +
                        " " +
                        authorEl.textContent
                    );

                speech.rate = 1;
                speech.pitch = 1;

                speechSynthesis.speak(speech);
            });

        getQuote();
    </script>

</body>

</html>
