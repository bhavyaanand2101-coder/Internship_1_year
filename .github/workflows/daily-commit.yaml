name: Daily Commit

on:
  schedule:
    # Runs every day at 12:00 PM IST (06:30 UTC)
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create activity file if missing
        run: |
          touch activity.txt

      - name: Update Activity File
        run: |
          echo "Last automated update: $(date -u)" >> activity.txt

      - name: Commit Changes
        run: |
          git add activity.txt
          git commit -m "Daily automated commit $(date -u '+%Y-%m-%d')" || echo "No changes to commit"

      - name: Push Changes
        run: |
          git push