cat > .github/workflows/daily-commit.yaml << 'EOF'
name: Daily Commit

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Activity File
        run: |
          echo "Last automated update: $(date -u)" >> activity.txt

      - name: Commit Changes
        run: |
          git add activity.txt
          git commit -m "Daily automated commit" || echo "No changes"

      - name: Push Changes
        run: |
          git push
EOF